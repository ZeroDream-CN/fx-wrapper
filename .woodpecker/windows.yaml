# Windows MSVC binaries (local backend agent)
# Requires on the agent host: Visual Studio 2022/Build Tools (C++), CMake, Git, PowerShell
#
# Secrets (repo settings):
#   clone_token   — Gitea Access Token（至少 read:repository；可与 release_token 用同一枚）
#                   事件请勾选 push / tag（如需 PR 构建再勾选 pull_request）
#   release_token — forge API token（仅 tag 发布需要；可与 clone_token 相同）
#
# 说明：
# 1) Windows Git Credential Manager 会劫持默认 HTTPS clone（OAuthAuthenticationModes 报错）
# 2) 本仓库 SSH 实际以 root@host:2233 使用（系统 SSH），与 Gitea Deploy Key(git@) 不是同一套认证
# 因此跳过默认 clone，改用 Token + HTTPS，并显式关掉 credential helper。

when:
  - event: push
  - event: pull_request
  - event: tag

labels:
  platform: windows/amd64
  backend: local

skip_clone: true

steps:
  - name: clone
    image: powershell
    environment:
      CLONE_TOKEN:
        from_secret: clone_token
    commands:
      - |
        $$ErrorActionPreference = "Stop"
        $$ws = $$env:CI_WORKSPACE
        if ([string]::IsNullOrWhiteSpace($$ws)) { $$ws = (Get-Location).Path }
        New-Item -ItemType Directory -Force -Path $$ws | Out-Null
        Set-Location -LiteralPath $$ws

        $$token = $$env:CLONE_TOKEN
        if ([string]::IsNullOrWhiteSpace($$token)) {
          throw "CLONE_TOKEN is empty; add repo secret 'clone_token' (Gitea PAT with read:repository)."
        }
        $$sha = $$env:CI_COMMIT_SHA
        if ([string]::IsNullOrWhiteSpace($$sha)) {
          throw "CI_COMMIT_SHA is empty."
        }

        $$cloneUrl = $$env:CI_REPO_CLONE_URL
        if ([string]::IsNullOrWhiteSpace($$cloneUrl)) {
          $$cloneUrl = "https://git.zerodream.net/$$($$env:CI_REPO_OWNER)/$$($$env:CI_REPO_NAME).git"
        }
        # Strip any embedded userinfo; authenticate via Authorization header.
        $$cloneUrl = $$cloneUrl -replace '^(https?://)[^@/]+@', '$$1'

        $$basic = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(("oauth2:" + $$token)))
        $$env:GIT_TERMINAL_PROMPT = "0"
        $$env:GCM_INTERACTIVE = "never"
        # Disable helpers so Git Credential Manager cannot intercept.
        $$gitAuthArgs = @(
          "-c", "credential.helper=",
          "-c", "http.extraHeader=Authorization: Basic $$basic"
        )

        Write-Host "HTTPS clone from $$cloneUrl ($$sha)"
        & git @gitAuthArgs init --object-format=sha1 -b main
        if ($$LASTEXITCODE -ne 0) { throw "git init failed" }
        & git @gitAuthArgs remote add origin $$cloneUrl
        if ($$LASTEXITCODE -ne 0) { throw "git remote add failed" }
        & git @gitAuthArgs fetch --no-tags --depth=1 origin "+$${sha}:"
        if ($$LASTEXITCODE -ne 0) { throw "git fetch failed" }
        & git @gitAuthArgs checkout --force FETCH_HEAD
        if ($$LASTEXITCODE -ne 0) { throw "git checkout failed" }
        & git @gitAuthArgs reset --hard $$sha
        if ($$LASTEXITCODE -ne 0) { throw "git reset failed" }

  - name: build-windows
    image: powershell
    commands:
      - .\scripts\build-windows-amd64.ps1

  - name: package
    image: powershell
    commands:
      - .\scripts\ci-package-windows.ps1

  - name: release
    image: powershell
    when:
      - event: tag
    environment:
      RELEASE_TOKEN:
        from_secret: release_token
    commands:
      - .\scripts\ci-upload-release.ps1 -Path artifacts
